site_name: Scripts ExaDEM Docs

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_category_heading: true
            merge_init_into_class: true
            docstring_style: numpy
            members_order: source

watch: 
  - lib
  - pre_processing
  - post_processing

use_directory_urls: false

nav: []
